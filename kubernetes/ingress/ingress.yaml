apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: gitops-ingress
  namespace: gitops-platform

spec:
  ingressClassName: nginx

  rules:
  - host: gitops.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-service
            port:
              number: 80